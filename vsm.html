<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Viable System Model — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --s5:#A0C0D5; --s4:#7BCA79; --s3:#FF5534; --s2:#FFCC50;
  --envF:#A2DAA0; --navy:#1D3880; --envOuter:#D7D7D7; --envBlob:#8F8F8F;
  --stroke:#9A9A9A; --ink:#23282f; --muted:#7a7f87;
  --bg:#eef0f2; --panel:#fff; --line:#e3e5e8;
}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;color:var(--ink);
  background:var(--bg);display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* breadcrumb */
#bcbar{background:#fff;border-bottom:1px solid var(--line);padding:7px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0;overflow-x:auto}
.bc{display:flex;align-items:center;gap:6px}
.bc-chip{display:inline-flex;flex-direction:column;align-items:flex-start;border:1px solid var(--line);background:#fafbfc;
  border-radius:7px;padding:3px 9px;cursor:pointer;white-space:nowrap;line-height:1.25}
.bc-chip:hover{background:#eef4f9;border-color:#cfe0ee}
.bc-chip .lvl{font-size:8.5px;letter-spacing:.4px;color:#9aa0a7;font-weight:700;text-transform:uppercase}
.bc-chip .nm{font-size:12px;font-weight:600}
.bc-chip.sif{background:#1b2330;border-color:#1b2330}
.bc-chip.sif .nm{color:#fff}.bc-chip.sif .lvl{color:#8fa4bd}
.bc-sep{color:#c2c7cd;font-size:13px}
.bc-chip.rminus{cursor:default;background:#fff;border-style:dashed}
.bc-chip.rminus:hover{background:#fff;border-color:var(--line)}
#paneToggle{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;flex-shrink:0;margin-left:auto;
  border:1px solid var(--line);background:#fff;border-radius:7px;cursor:pointer;color:var(--ink);padding:0}
#paneToggle:hover{background:#eef4f9;border-color:#cfe0ee}
#paneToggle svg{display:block}
body.pane-hidden .sidebar{display:none}

.layout{flex:1;display:flex;min-height:0}
.stage{flex:1;overflow:hidden;display:block;padding:10px;position:relative;cursor:grab}
.stage svg{width:100%;height:100%;display:block}
.stage svg [data-el]{cursor:pointer}
.stagewrap{width:100%;height:100%;transition:opacity .18s ease, transform .18s ease}
.stagewrap.flip{opacity:0;transform:scale(.97)}
body.panning *{cursor:grabbing !important}
/* canvas zoom controls (Miro/Maps style, bottom-right of the stage) */
#zoomctl{position:absolute;right:11px;bottom:11px;z-index:6;display:flex;flex-direction:column;
  background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:0 2px 7px rgba(20,30,50,.12);overflow:hidden;cursor:default}
#zoomctl button{width:26px;height:22px;border:none;border-top:1px solid var(--line);background:#fff;cursor:pointer;color:var(--ink);
  font-size:13px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0}
#zoomctl button:first-child{border-top:none}
#zoomctl button:hover{background:#eef4f9}
#zoomctl #zpct{font-size:7.5px;font-weight:700;color:var(--muted);letter-spacing:.1px}

/* sidebar */
.sidebar{width:288px;flex-shrink:0;background:var(--panel);border-left:1px solid var(--line);overflow-y:auto}
.sec{padding:13px 15px;border-bottom:1px solid var(--line)}
.sec h3{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:9px;display:flex;justify-content:space-between}
.toggles{display:flex;flex-direction:column;gap:4px}
.tg{display:flex;align-items:center;gap:8px;padding:5px 8px;border:1.5px solid var(--line);border-radius:7px;background:#fafbfc;
  cursor:pointer;font-size:12px;user-select:none}
.tg:hover{background:#f1f3f5}
.tg.off{opacity:.42}
.tg .sw{width:12px;height:12px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:8px}
.tg .ky{font-size:9px;color:#9aa0a7;margin-left:auto;font-weight:700}

/* units list */
.unit-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.unit-row .tag{font-size:10px;font-weight:700;color:#fff;background:var(--navy);border-radius:4px;padding:2px 5px;flex-shrink:0;width:24px;text-align:center}
.unit-row input{flex:1;border:1px solid var(--line);border-radius:6px;padding:4px 7px;font-size:12px;font-family:inherit;color:var(--ink);min-width:0}
.unit-row input:focus{outline:none;border-color:#cfe0ee;background:#f7fbff}
.unit-row button{border:none;background:none;cursor:pointer;color:#bcc2c8;font-size:15px;line-height:1;padding:2px 4px}
.unit-row button:hover{color:#e0533a}
.unit-row .grip{cursor:grab;color:#cbd0d6;font-size:13px;line-height:1;flex-shrink:0;user-select:none}
.unit-row .grip:hover{color:#8b9199}
.unit-row .grip:active{cursor:grabbing}
.unit-row.dragging{opacity:.45}
.unit-row.drop-above{box-shadow:0 -2px 0 0 var(--navy)}
.unit-row.drop-below{box-shadow:0 2px 0 0 var(--navy)}
.addbtn{width:100%;border:1px dashed var(--line);background:#fafbfc;border-radius:7px;padding:6px;font-size:12px;font-weight:600;
  cursor:pointer;color:var(--muted);margin-top:3px}
.addbtn:hover{background:#f1f3f5;color:var(--ink)}


/* info */
#info .badge{display:flex;align-items:center;gap:8px;margin-bottom:7px}
#info .cbar{width:5px;height:22px;border-radius:3px;background:var(--ink)}
#info h4{font-size:13.5px}
#info p{font-size:12px;color:#54595f;line-height:1.6;margin-top:4px}
#info .act{margin-top:11px;display:flex;gap:7px;flex-wrap:wrap}
#info .act button{border:1px solid var(--line);background:#fff;border-radius:7px;padding:6px 11px;font-size:12px;font-weight:600;cursor:pointer}
#info .drill{background:#1b2330;color:#fff;border-color:#1b2330}
#info .act button:hover{filter:brightness(1.06)}

.legend{display:flex;flex-direction:column;gap:5px}
.lg{display:flex;align-items:center;gap:8px;font-size:11.5px}
.lg .chip{width:30px;height:15px;border-radius:3px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:8.5px;font-weight:700;flex-shrink:0}

/* svg interactivity */
.clk{cursor:pointer}
.clk:hover{filter:brightness(1.07)}
.unit-hit{cursor:pointer}
.unit-hit:hover .opsq{stroke:#1b2330;stroke-width:2.6}
.lyr.hidden{display:none}
.sel{outline:none}
.selring{fill:none;stroke:#1b2330;stroke-width:2;stroke-dasharray:4 3;opacity:.8}
.handle{cursor:grab}.handle:hover{stroke-width:2.5}.editlayer{pointer-events:auto}
#tt{position:fixed;background:rgba(20,22,28,.93);color:#eef0f2;padding:6px 10px;border-radius:6px;font-size:11.5px;
  line-height:1.45;pointer-events:none;max-width:230px;z-index:99;display:none;white-space:pre-line;box-shadow:0 3px 12px rgba(0,0,0,.3)}
</style>
</head>
<body>
<div id="bcbar">
  <div class="bc" id="breadcrumb"></div>
  <button id="paneToggle" type="button" aria-label="Hide VSM detail pane" title="Hide detail pane" aria-pressed="false"></button>
</div>

<div class="layout">
  <div class="stage"><div class="stagewrap" id="stagewrap"></div>
    <div id="zoomctl">
      <button id="zin" type="button" aria-label="Zoom in" title="Zoom in">+</button>
      <button id="zpct" type="button" aria-label="Reset zoom to fit" title="Reset to fit (100%)">100%</button>
      <button id="zout" type="button" aria-label="Zoom out" title="Zoom out">−</button>
    </div>
  </div>
  <aside class="sidebar">
    <div class="sec">
      <h3>Operational units (System 1)</h3>
      <div id="unitList"></div>
      <button class="addbtn" id="addUnit">+ Add operational unit</button>
    </div>
    <div class="sec">
      <h3>Channels</h3>
      <div class="toggles" id="layerToggles"></div>
    </div>
    <div class="sec">
      <h3>Element info</h3>
      <div id="info"></div>
    </div>
    <div class="sec">
      <h3>Legend</h3>
      <div class="legend">
        <div class="lg"><span class="chip" style="background:#A0C0D5">5</span>Policy / identity</div>
        <div class="lg"><span class="chip" style="background:#7BCA79">4</span>Intelligence / future</div>
        <div class="lg"><span class="chip" style="background:#FF5534">3</span>Control + command channel</div>
        <div class="lg"><span class="chip" style="background:#FF5534;font-size:7px">3*</span>Audit (sporadic probe)</div>
        <div class="lg"><span class="chip" style="background:#FFCC50">2</span>Coordination (anti-oscillation)</div>
        <div class="lg"><span class="chip" style="background:#8F8F8F">1</span>Operations (click to unfold)</div>
      </div>
    </div>
    <div class="sec" style="border-bottom:none">
      <h3>Homeostat shape editor</h3>
      <div id="shapeEditor"></div>
    </div>
  </aside>
</div>
<div id="tt"></div>

<script>
"use strict";
const C={s5:'#A0C0D5',s4:'#7BCA79',s3:'#FF5534',s2:'#FFCC50',envF:'#9BC799',navy:'#1D3880',
  envOuter:'#D7D7D7',envBlob:'#919CA4',stroke:'#9A9A9A',amber:'#FFCC50',alg:'#C0399F'};

/* ---------- data model (recursive tree of viable systems) ---------- */
let _id=0;
function node(name,kids){return{id:++_id,name,children:kids||null,_gen:!kids};}
let tree=node('Global Group',[
  node('Mobility',[node('Powertrain'),node('Chassis Systems'),node('Driver Assistance'),node('E-Bike Systems')]),
  node('Industrial Technology',[node('Drive & Control'),node('Hydraulics'),node('Factory Automation')]),
  node('Consumer Goods',[node('Power Tools'),node('Home Appliances')]),
  node('Energy & Building',[node('Heating'),node('Security Systems'),node('Thermotechnology')]),
]);
function ensureChildren(n){
  if(!n.children||!n.children.length){
    n.children=['Sub-unit A','Sub-unit B','Sub-unit C'].map(s=>node(n.name+' · '+s));
  }
  return n.children;
}
let path=[tree];                 // root -> ... -> SIF
const sif=()=>path[path.length-1];
const letters='abcdefghijklmnop';

/* ---------- layer state ---------- */
const LAYERS=[
  {id:'a',    name:'a · Environmental overlaps',  sw:'#FFCC50', key:'a'},
  {id:'b',    name:'b · System 3* audit',         sw:'#FF5534', key:'b'},
  {id:'c',    name:'c · Operational dependencies', sw:'#FFCC50', key:'c'},
  {id:'d',    name:'d · Resource bargain',         sw:'#FF5534', key:'d'},
  {id:'e',    name:'e · Command (intervention)',   sw:'#FF5534', key:'e'},
  {id:'f',    name:'f · System 2 coordination',    sw:'#FFCC50', key:'f'},
  {id:'g',    name:'g · Algedonic (optional)',     sw:'#C0399F', key:'g'},
];
const shown={}; LAYERS.forEach(l=>shown[l.id]=true); shown.g=false; shown.env=true; shown.meta=true; // env + metasystem always shown (not channel toggles)
let selected=null; // {type, idx}
let paneShown=true; // details side-pane visibility (true = shown); see setPane()
let baseViewH=732;  // content height of the current level (= H-36); set each render. Pan/zoom state lives in zoom/panX/panY.

/* ---------- editable bezier shapes: homeostat arrows + S5 dampening arms ---------- */
let editMode=false, drag=null;
const SHAPE_DEF={
  red:  [[491,220],[442,181],[453,160],[491,133]],
  green:[[647,133],[693,145],[682,201],[643,218]],
  armL: [[492,69],[440,82],[420,140],[455,172]],
  armR: [[646,67],[701,81],[703,145],[679,171]]
};
let shapes; try{shapes=JSON.parse(localStorage.getItem('vsmShapes3'));}catch(e){}
if(!shapes||!shapes.red) shapes=JSON.parse(JSON.stringify(SHAPE_DEF));
const shapeD=p=>`M ${p[0][0]} ${p[0][1]} C ${p[1][0]} ${p[1][1]} ${p[2][0]} ${p[2][1]} ${p[3][0]} ${p[3][1]}`;
function editHandles(){let h='';for(const k in shapes){const p=shapes[k];
  h+=`<line x1="${p[0][0]}" y1="${p[0][1]}" x2="${p[1][0]}" y2="${p[1][1]}" stroke="#6b7480" stroke-width="0.8" stroke-dasharray="3 2"/>`
    +`<line x1="${p[3][0]}" y1="${p[3][1]}" x2="${p[2][0]}" y2="${p[2][1]}" stroke="#6b7480" stroke-width="0.8" stroke-dasharray="3 2"/>`;
  for(let j=0;j<4;j++){const en=(j===0||j===3);
    h+=`<circle class="handle" data-shp="${k}" data-pt="${j}" cx="${p[j][0]}" cy="${p[j][1]}" r="${en?5:4.2}" fill="${en?'#1b2330':'#fff'}" stroke="#1b2330" stroke-width="1.5"/>`;}}
  return h;}

/* ---------- geometry helpers ---------- */
const f=n=>(+n).toFixed(1);
function blob(cx,cy,rx,ry,seed,amp=1){
  const n=16,p=[];
  for(let i=0;i<n;i++){const a=i/n*Math.PI*2;
    const w=0.80+0.18*amp*Math.sin(seed*1.3+i*1.7)+0.07*amp*Math.cos(seed*0.7+i*2.3);
    p.push([cx+Math.cos(a)*rx*w, cy+Math.sin(a)*ry*w]);}
  const mid=(A,B)=>`${f((A[0]+B[0])/2)} ${f((A[1]+B[1])/2)}`;
  let d=`M ${mid(p[n-1],p[0])}`;
  for(let i=0;i<n;i++){const cur=p[i],nx=p[(i+1)%n];d+=` Q ${f(cur[0])} ${f(cur[1])} ${mid(cur,nx)}`;}
  return d+' Z';
}
// organic tall amoeba/silhouette: broad rounded head (top), narrow neck, broad body, tapering bottom
function envSilhouette(cx,yTop,yBot,seed){
  const H=yBot-yTop;
  const prof=[[0,12],[0.07,62],[0.16,54],[0.27,38],[0.38,52],[0.54,62],[0.70,58],[0.85,52],[0.95,42],[1,20]];
  const hw=t=>{for(let i=0;i<prof.length-1;i++){if(t<=prof[i+1][0]){const a=prof[i],b=prof[i+1],u=(t-a[0])/(b[0]-a[0]);return a[1]+(b[1]-a[1])*u;}}return prof[prof.length-1][1];};
  const pts=[],n=15;
  for(let i=0;i<=n;i++){const t=i/n,y=yTop+t*H,w=hw(t)*(1+0.05*Math.sin(seed+i*1.9));pts.push([cx+w,y]);}
  for(let i=n;i>=0;i--){const t=i/n,y=yTop+t*H,w=hw(t)*(1+0.05*Math.cos(seed*1.3+i*1.4));pts.push([cx-w,y]);}
  const mid=(A,B)=>`${f((A[0]+B[0])/2)} ${f((A[1]+B[1])/2)}`;
  let d=`M ${mid(pts[pts.length-1],pts[0])}`;
  for(let i=0;i<pts.length;i++){const cur=pts[i],nx=pts[(i+1)%pts.length];d+=` Q ${f(cur[0])} ${f(cur[1])} ${mid(cur,nx)}`;}
  return d+' Z';
}
function wave(x,y1,y2,amp){ // vertical squiggle
  let d=`M ${f(x)} ${f(y1)}`,steps=Math.max(3,Math.round((y2-y1)/12)),dir=1;
  for(let i=1;i<=steps;i++){const y=y1+(y2-y1)*i/steps,ya=y1+(y2-y1)*(i-0.5)/steps;
    d+=` Q ${f(x+amp*dir)} ${f(ya)} ${f(x)} ${f(y)}`;dir*=-1;}
  return d;
}

/* ---------- layout constants ---------- */
const L={W:900,metaCx:568,
  s5:{x:493,w:150,y:42,h:46}, s4:{x:493,w:150,y:112,h:38}, s3:{x:493,w:150,y:194,h:48},
  s3star:{cx:360,topY:230,botY:285}, s2:{cx:748,topY:230,botY:285},
  circleX:490,r:25, sqCx:568,sqW:102,sqH:48, cmdL:561,cmdR:575,
  auditX:458, ladderL:680,ladderR:702, envX:200,
  row0:332, rowH:112};
const rowY=i=>L.row0+i*L.rowH;

/* ---------- render ---------- */
function render(){
  const kids=sif().children||[];
  const N=Math.max(kids.length,1);
  const lastY=rowY(N-1), botY=lastY+74, H=botY+26;

  baseViewH=H-36;                       // content height (content spans y34..~H-2). SVG fills the stage; viewBox matches stage aspect.
  clampView();
  const vb0=curVB();
  let s=`<svg viewBox="${f(vb0.x)} ${f(vb0.y)} ${f(vb0.w)} ${f(vb0.h)}" width="${CONTENT.w}" height="${f(baseViewH)}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,system-ui,sans-serif">`;
  s+=defs();

  /* ===== ENVIRONMENT layer ===== */
  s+=`<g class="lyr ${shown.env?'':'hidden'}" data-lyr="env">`;
  // TOTAL environment — organic light-grey silhouette, behind everything, encompassing the future + all sub-envs
  s+=`<path d="${envSilhouette(L.envX,70,lastY+90,2)}" fill="${C.envOuter}" opacity=".5"/>`;
  // FUTURE / intelligence environment — green cloud at the top (inside the total env, clear grey cap+margin all round), scanned by S4
  s+=`<path class="clk" data-el="future" d="${blob(L.envX,150,46,40,7)}" fill="${C.envF}" opacity=".92"/>`;
  // local SUB-ENVIRONMENTS — one per S1, strongly OVERLAPPING into a continuous chain (tall blobs, damped perturbation so they always overlap; group opacity avoids double-darkening)
  s+=`<g opacity=".72">`;
  for(let i=0;i<N;i++){const y=rowY(i);
    s+=`<path class="clk" data-el="env" data-idx="${i}" d="${blob(L.envX,y,43,86,i+3,0.6)}" fill="${C.envBlob}"/>`;}
  s+=`</g>`;
  s+=`</g>`;

  /* ===== channel a: environmental overlaps ===== */
  s+=`<g class="lyr ${shown.a?'':'hidden'}" data-lyr="a">`;
  for(let i=0;i<N-1;i++){const ym=(rowY(i)+rowY(i+1))/2;
    s+=`<ellipse class="clk" data-el="a" cx="${L.envX}" cy="${f(ym)}" rx="27" ry="11" fill="${C.amber}" opacity=".6"/>`;}
  s+=`</g>`;

  // (S5 dampening arms drawn AFTER the metasystem/homeostat below, so their ends stay visible)

  /* ===== channel c: operational dependencies (yellow squiggle, aligned with circles) ===== */
  s+=`<g class="lyr ${shown.c?'':'hidden'}" data-lyr="c">`;
  for(let i=0;i<N-1;i++){
    s+=`<path class="clk" data-el="c" d="${wave(L.circleX,rowY(i)+L.r,rowY(i+1)-L.r,4)}" fill="none" stroke="${C.s2}" stroke-width="2.6"/>`;}
  s+=`</g>`;

  /* ===== channel f: System 2 coordination (SINGLE line under S2, rungs into units) ===== */
  s+=`<g class="lyr ${shown.f?'':'hidden'}" data-lyr="f">`;
  s+=`<line class="clk" data-el="f" x1="${L.s2.cx}" y1="${L.s2.botY}" x2="${L.s2.cx}" y2="${f(lastY)}" stroke="${C.s2}" stroke-width="4.5"/>`;
  for(let i=0;i<N;i++){const y=rowY(i);
    s+=`<line class="clk" data-el="f" x1="621" y1="${f(y)}" x2="${L.s2.cx}" y2="${f(y)}" stroke="${C.s2}" stroke-width="3.6"/>`;}
  s+=`</g>`;

  /* ===== channel e: command / intervention (LEFT central red line, from metasystem) ===== */
  s+=`<g class="lyr ${shown.e?'':'hidden'}" data-lyr="e">`;
  s+=`<line class="clk" data-el="e" x1="${L.cmdL}" y1="${L.s3.y+L.s3.h}" x2="${L.cmdL}" y2="${f(lastY)}" stroke="${C.s3}" stroke-width="4.5"/>`;
  s+=`</g>`;

  /* ===== channel d: resource bargain (RIGHT central red line, next to command) ===== */
  s+=`<g class="lyr ${shown.d?'':'hidden'}" data-lyr="d">`;
  s+=`<line class="clk" data-el="d" x1="${L.cmdR}" y1="${L.s3.y+L.s3.h}" x2="${L.cmdR}" y2="${f(lastY)}" stroke="${C.s3}" stroke-width="4.5"/>`;
  s+=`</g>`;

  /* ===== channel b: System 3* audit (aligned under 3*, into operation circles) ===== */
  s+=`<g class="lyr ${shown.b?'':'hidden'}" data-lyr="b">`;
  s+=`<line class="clk" data-el="b" x1="${L.s3star.cx}" y1="${L.s3star.botY-2}" x2="${L.s3star.cx}" y2="${f(lastY)}" stroke="${C.s3}" stroke-width="3.6"/>`;
  for(let i=0;i<N;i++){const y=rowY(i);
    s+=`<line class="clk" data-el="b" x1="${L.s3star.cx}" y1="${f(y)}" x2="463" y2="${f(y)}" stroke="${C.s3}" stroke-width="2.4"/>`;}
  s+=`</g>`;

  /* ===== METASYSTEM ===== */
  s+=`<g class="lyr ${shown.meta?'':'hidden'}" data-lyr="meta">`;
  // central spine connectors (left = command, right = resource bargain — both from 5·4·3)
  s+=`<line x1="${L.cmdL}" y1="${L.s5.y+L.s5.h}" x2="${L.cmdL}" y2="${L.s4.y}" stroke="${C.s5}" stroke-width="3.4"/>`
    +`<line x1="${L.cmdR}" y1="${L.s5.y+L.s5.h}" x2="${L.cmdR}" y2="${L.s4.y}" stroke="${C.s5}" stroke-width="3.4"/>`;
  s+=`<line x1="${L.cmdL}" y1="${L.s4.y+L.s4.h}" x2="${L.cmdL}" y2="${L.s3.y}" stroke="${C.s4}" stroke-width="4.5"/>`
    +`<line x1="${L.cmdR}" y1="${L.s4.y+L.s4.h}" x2="${L.cmdR}" y2="${L.s3.y}" stroke="${C.s4}" stroke-width="4.5"/>`;
  // S3 -> S3* (LEFT) and S3 -> S2 (RIGHT) feeds — "shoulder" right-angle elbows whose horizontal runs INSIDE S3's height (hidden behind the bar), so they look like they plug INTO S3. No arrowheads.
  s+=`<path d="M 520 216 L ${L.s3star.cx} 216 L ${L.s3star.cx} ${L.s3star.topY}" fill="none" stroke="${C.s3}" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>`;
  s+=`<path d="M 616 216 L ${L.s2.cx} 216 L ${L.s2.cx} ${L.s2.topY}" fill="none" stroke="${C.s2}" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>`;
  // (homeostat + S4-future eye are drawn AFTER the bars, below — so their arrowheads stay visible on top)
  // bars
  s+=bar('5',C.s5,L.s5);
  s+=bar('4',C.s4,L.s4);
  s+=bar('3',C.s3,L.s3);
  // 3<->4 HOMEOSTAT (editable shapes red / green) drawn ON TOP of the bars so arrowheads stay visible
  s+=`<path id="shp-red" d="${shapeD(shapes.red)}" fill="none" stroke="${C.s3}" stroke-width="7" marker-end="url(#aRh)" stroke-linecap="round"/>`;
  s+=`<path id="shp-green" d="${shapeD(shapes.green)}" fill="none" stroke="${C.s4}" stroke-width="7" marker-end="url(#aGh)" stroke-linecap="round"/>`;
  // S4 <-> future cloud eye (thin green, two-way). Top arrow (S4 -> environment) approaches the cloud's edge horizontally so its tip lands cleanly.
  s+=`<path d="M 499 126 C 451 107 ${L.envX+96} 107 ${L.envX+48} 126" fill="none" stroke="${C.s4}" stroke-width="2.3" marker-end="url(#aG)"/>`
    +`<path d="M ${L.envX+48} 136 C ${L.envX+96} 155 451 155 499 136" fill="none" stroke="${C.s4}" stroke-width="2.3" marker-end="url(#aGr)"/>`;
  // S3* inverted triangle (LEFT) — never forget
  const t1=L.s3star;
  s+=`<polygon class="clk" data-el="3*" points="${t1.cx-30},${t1.topY} ${t1.cx+30},${t1.topY} ${t1.cx},${t1.botY}" fill="${C.s3}" stroke="#c23a22" stroke-width="1"/>`
    +`<text x="${t1.cx}" y="${t1.topY+19}" text-anchor="middle" font-size="14" font-weight="700" fill="#fff" pointer-events="none">3*</text>`;
  // S2 upward triangle (RIGHT)
  const t2=L.s2;
  s+=`<polygon class="clk" data-el="2" points="${t2.cx-30},${t2.botY} ${t2.cx+30},${t2.botY} ${t2.cx},${t2.topY}" fill="${C.s2}" stroke="#d9a52f" stroke-width="1"/>`
    +`<text x="${t2.cx}" y="${t2.botY-9}" text-anchor="middle" font-size="14" font-weight="700" fill="#fff" pointer-events="none">2</text>`;
  s+=`</g>`;

  /* ===== S5 dampening arms — ON TOP of the homeostat so their ends (A/B) stay visible ===== */
  s+=`<g class="lyr ${shown.meta?'':'hidden'}" data-lyr="meta-arms">`;
  s+=`<path id="shp-armL" d="${shapeD(shapes.armL)}" fill="none" stroke="${C.s5}" stroke-width="6" stroke-linecap="round"/>`;
  s+=`<path id="shp-armR" d="${shapeD(shapes.armR)}" fill="none" stroke="${C.s5}" stroke-width="6" stroke-linecap="round"/>`;
  s+=`</g>`;

  /* ===== S1 UNITS (operations) ===== */
  s+=`<g class="lyr ${shown.meta?'':''}" data-lyr="units">`;
  for(let i=0;i<N;i++){const y=rowY(i),u=kids[i],lab='1'+letters[i],nm=u?u.name:'';
    const lines=wrapName(nm,16);
    const selRing=(selected&&selected.type==='unit'&&selected.idx===i)
      ?`<rect class="selring" x="${L.sqCx-L.sqW/2-5}" y="${y-L.sqH/2-5}" width="${L.sqW+10}" height="${L.sqH+10}" rx="9"/>`:'';
    s+=`<g class="unit-hit" data-el="unit" data-idx="${i}"><title>${esc(lab+' · '+nm)}</title>`;
    s+=`<line x1="515" y1="${f(y)}" x2="${L.sqCx-L.sqW/2}" y2="${f(y)}" stroke="${C.stroke}" stroke-width="1.5"/>`;
    s+=`<circle cx="${L.circleX}" cy="${f(y)}" r="${L.r}" fill="#fff" stroke="${C.stroke}" stroke-width="2"/>`;
    s+=`<rect class="opsq" x="${L.sqCx-L.sqW/2}" y="${f(y-L.sqH/2)}" width="${L.sqW}" height="${L.sqH}" rx="7" fill="#fff" stroke="${C.stroke}" stroke-width="2"/>`;
    if(lines.length===1){
      s+=`<text x="${L.sqCx}" y="${f(y+3.5)}" text-anchor="middle" font-size="10" font-weight="600" fill="#3a3f45" pointer-events="none">${esc(lines[0])}</text>`;
    }else{
      s+=`<text x="${L.sqCx}" y="${f(y-2)}" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3a3f45" pointer-events="none">${esc(lines[0])}</text>`
        +`<text x="${L.sqCx}" y="${f(y+10)}" text-anchor="middle" font-size="9.5" font-weight="600" fill="#3a3f45" pointer-events="none">${esc(lines[1])}</text>`;
    }
    s+=selRing+`</g>`;
  }
  s+=`</g>`;

  /* ===== algedonic alert (optional, beyond the Pfiffner deck) ===== */
  s+=`<g class="lyr ${shown.g?'':'hidden'}" data-lyr="g">`;
  s+=`<circle class="clk" data-el="g" cx="600" cy="${f(lastY)}" r="4.5" fill="${C.alg}"/>`
    +`<path class="clk" data-el="g" d="M 605 ${f(lastY)} L 736 ${f(lastY)} L 736 108 C 736 94 716 88 ${L.s5.x+L.s5.w-14} 86" fill="none" stroke="${C.alg}" stroke-width="2.4" stroke-dasharray="7 4" marker-end="url(#aA)"/>`;
  s+=`</g>`;
  // input/output eye-loops (operation <-> environment) — ON TOP, rounder cubic ovals
  s+=`<g class="lyr ${shown.env?'':'hidden'}" data-lyr="eyeloops" opacity=".85">`;
  for(let i=0;i<N;i++){const y=rowY(i), ex=L.envX+40, cx=462, eg=11;
    s+=`<path d="M ${cx} ${f(y-eg)} C ${f(cx-36)} ${f(y-41)} ${f(ex+36)} ${f(y-41)} ${f(ex)} ${f(y-eg)}" fill="none" stroke="${C.navy}" stroke-width="1.8" marker-end="url(#aN)"/>`
      +`<path d="M ${f(ex)} ${f(y+eg)} C ${f(ex+36)} ${f(y+41)} ${f(cx-36)} ${f(y+41)} ${cx} ${f(y+eg)}" fill="none" stroke="${C.navy}" stroke-width="1.8" marker-end="url(#aN)"/>`;
  }
  s+=`</g>`;
  if(editMode) s+=`<g id="editlayer">${editHandles()}</g>`;
  s+=`</svg>`;
  document.getElementById('stagewrap').innerHTML=s;
  drawBreadcrumb(); drawLayers(); drawUnits(); drawInfo(); drawShapeEditor();
  bindSvg(); updateZoomUI();
}

function wrapName(nm,maxc){nm=nm||'';if(nm.length<=maxc)return[nm];

function bindSvg(){
  const svg=document.querySelector('#stagewrap svg');
  svg.addEventListener('click',e=>{
    if(suppressClick){suppressClick=false;return;} // a pan-drag just ended — don't treat it as a click
    const el=e.target.closest('[data-el]');if(!el)return;
    const type=el.dataset.el;
    const idx=el.dataset.idx!=null?+el.dataset.idx:null;
    // bridge: notify host of EVERY data-el click — IN ADDITION to the info-panel behavior below
    BRIDGE.click(type,idx,(type==='unit'&&idx!=null)?(sif().children||[])[idx]:null);
    if(type==='unit'){selected={type:'unit',idx};drawInfo();render();return;}
    if(type==='env'||type==='future'){selected={type};drawInfo();markSel();return;}
    selected={type};drawInfo();markSel();
  });
  svg.addEventListener('dblclick',e=>{
    const el=e.target.closest('[data-el="unit"]');if(!el)return;
    drillInto(+el.dataset.idx);
  });
  svg.addEventListener('mousemove',e=>{
    const el=e.target.closest('[data-el]');const tt=document.getElementById('tt');
    if(!el){tt.style.display='none';return;}
    const map={unit:'Operation — double-click to unfold',env:'Local environment',future:'Future environment (System 4 scans this)',
      '5':'System 5 · Policy','4':'System 4 · Intelligence','3':'System 3 · Control','3*':'System 3* · Audit (never forget)',
      '2':'System 2 · Coordination','a':'Channel a · environmental overlaps','b':'Channel b · 3* audit',
      'c':'Channel c · operational dependencies','d':'Channel d · resource bargain','e':'Channel e · command','f':'Channel f · S2 coordination','g':'Algedonic alert (optional)'};
    tt.textContent=map[el.dataset.el]||'';tt.style.display='block';
    tt.style.left=(e.clientX+13)+'px';tt.style.top=(e.clientY-6)+'px';
  });
  svg.addEventListener('mouseleave',()=>document.getElementById('tt').style.display='none');
}

/* ---------- geometric pan + zoom — the SVG fills the WHOLE stage; the viewBox matches the stage's
   aspect ratio and frames the content, so zoom/pan use the entire viewport (no fixed drawing box). ---------- */
const MAXZOOM=6, CONTENT={x:130,y:34,w:652}; // content box (x,y,w fixed; height = baseViewH, set per render)
let zoom=1, panX=0, panY=0;                  // zoom: 1 = fit; panX/panY: view-centre offset from content centre (content units)
function curSvg(){return document.querySelector('#stagewrap svg');}
function stageWH(){const st=document.querySelector('.stage');const w=(st?st.clientWidth:innerWidth)-20,h=(st?st.clientHeight:innerHeight)-20;return[Math.max(1,w),Math.max(1,h)];}
function fitVB(){                     // zoom=1 / pan=0 viewBox: the content box expanded to the stage aspect ratio
  const wh=stageWH(),A=wh[0]/wh[1],cw=CONTENT.w,ch=baseViewH,Ac=cw/ch; let w,h;
  if(A>=Ac){h=ch;w=ch*A;}else{w=cw;h=cw/A;}
  return{x:CONTENT.x+cw/2-w/2, y:CONTENT.y+ch/2-h/2, w, h};
}
function curVB(){const F=fitVB(),w=F.w/zoom,h=F.h/zoom;
  return{x:CONTENT.x+CONTENT.w/2+panX-w/2, y:CONTENT.y+baseViewH/2+panY-h/2, w, h};}
function clampView(){                 // keep the view inside the fit frame
  zoom=Math.min(MAXZOOM,Math.max(1,zoom));
  const F=fitVB(),w=F.w/zoom,h=F.h/zoom,cx0=CONTENT.x+CONTENT.w/2,cy0=CONTENT.y+baseViewH/2;
  let ccx=cx0+panX,ccy=cy0+panY;
  ccx=Math.min(F.x+F.w-w/2,Math.max(F.x+w/2,ccx)); ccy=Math.min(F.y+F.h-h/2,Math.max(F.y+h/2,ccy));
  panX=ccx-cx0; panY=ccy-cy0;
}
function applyVB(){clampView();const svg=curSvg();if(svg){const v=curVB();svg.setAttribute('viewBox',`${f(v.x)} ${f(v.y)} ${f(v.w)} ${f(v.h)}`);}updateZoomUI();}
function zoomAround(factor,ux,uy){    // scale while keeping the user-space point (ux,uy) fixed under the cursor
  const vb=curVB(),nz=Math.min(MAXZOOM,Math.max(1,zoom*factor)),rf=nz/zoom; if(rf===1)return;
  const w=vb.w/rf,h=vb.h/rf,nx=ux-(ux-vb.x)/rf,ny=uy-(uy-vb.y)/rf;
  zoom=nz; panX=(nx+w/2)-(CONTENT.x+CONTENT.w/2); panY=(ny+h/2)-(CONTENT.y+baseViewH/2); applyVB();
}
function zoomCentre(factor){const vb=curVB();zoomAround(factor, vb.x+vb.w/2, vb.y+vb.h/2);}
function fitView(){zoom=1;panX=0;panY=0;applyVB();}
function resetView(){zoom=1;panX=0;panY=0;}   // recursion navigation re-frames to fit (applied by the next render)
function updateZoomUI(){const p=document.getElementById('zpct');if(p)p.textContent=Math.round(zoom*100)+'%';}

document.getElementById('breadcrumb').addEventListener('click',e=>{
  const c=e.target.closest('[data-bc]');if(!c)return;const i=+c.dataset.bc;
  if(i<path.length-1){path=path.slice(0,i+1);selected=null;resetView();render();BRIDGE.zoom();}
});
document.getElementById('layerToggles').addEventListener('click',e=>{
  const t=e.target.closest('[data-tgl]');if(!t)return;shown[t.dataset.tgl]=!shown[t.dataset.tgl];render();
});
document.getElementById('unitList').addEventListener('input',e=>{
  const inp=e.target.closest('[data-uidx]');if(!inp)return;
  const u=(sif().children||[])[+inp.dataset.uidx];if(u){u.name=inp.value;u._gen=false;
    BRIDGE.mutate('rename',{node:u,index:+inp.dataset.uidx});
    // update just the label live
    render();/* keep focus */ const again=document.querySelector(`#unitList [data-uidx="${inp.dataset.uidx}"]`);
    if(again){again.focus();again.setSelectionRange(again.value.length,again.value.length);}
  }
});
document.getElementById('unitList').addEventListener('click',e=>{
  const rm=e.target.closest('[data-rm]');if(!rm)return;
  const kids=sif().children||[];if(kids.length<=1)return;
  const i=+rm.dataset.rm; const [removed]=kids.splice(i,1);selected=null;render();
  BRIDGE.mutate('remove',{node:removed,index:i});
});
/* drag-to-reorder operational units (grip handle) */
let uDrag=null;
const _ul=document.getElementById('unitList');
const _clearDrop=()=>_ul.querySelectorAll('.drop-above,.drop-below').forEach(r=>r.classList.remove('drop-above','drop-below'));
const _endDrag=()=>{uDrag=null;_ul.querySelectorAll('.dragging,.drop-above,.drop-below').forEach(r=>r.classList.remove('dragging','drop-above','drop-below'));};
_ul.addEventListener('dragstart',e=>{
  const row=e.target.closest('.grip')&&e.target.closest('.unit-row');
  if(!row){e.preventDefault();return;}
  uDrag=+row.dataset.row;
  e.dataTransfer.effectAllowed='move';
  try{e.dataTransfer.setData('text/plain',String(uDrag));}catch(_){}
  try{e.dataTransfer.setDragImage(row,18,14);}catch(_){}
  setTimeout(()=>row.classList.add('dragging'),0);
});
_ul.addEventListener('dragover',e=>{
  if(uDrag===null)return; e.preventDefault(); e.dataTransfer.dropEffect='move';
  const row=e.target.closest('.unit-row'); _clearDrop();
  if(!row||+row.dataset.row===uDrag)return;
  const r=row.getBoundingClientRect();
  row.classList.add((e.clientY-r.top)<r.height/2?'drop-above':'drop-below');
});
_ul.addEventListener('drop',e=>{
  if(uDrag===null)return; e.preventDefault();
  const kids=sif().children||[]; const row=e.target.closest('.unit-row');
  const from=uDrag; uDrag=null;
  let to;
  if(!row){to=kids.length;}
  else{const over=+row.dataset.row; const r=row.getBoundingClientRect();
       to=((e.clientY-r.top)<r.height/2)?over:over+1;}
  if(to>from)to--;
  if(to===from){_endDrag();return;}
  const [m]=kids.splice(from,1);
  const at=Math.max(0,Math.min(to,kids.length)); kids.splice(at,0,m);
  selected=null; render();
  BRIDGE.mutate('reorder',{node:m,order:kids,from,to:at});
});
_ul.addEventListener('dragend',_endDrag);
document.getElementById('addUnit').onclick=()=>{
  const kids=ensureChildren(sif());const u=node('New unit');kids.push(u);render();
  BRIDGE.mutate('add',{node:u,index:kids.length-1,tempId:'local:'+u.id});
};
document.getElementById('info').addEventListener('click',e=>{
  const d=e.target.closest('[data-drill]');if(d)drillInto(+d.dataset.drill);
});

/* ---------- shape editor: toggle + drag ---------- */
document.getElementById('shapeEditor').addEventListener('click',e=>{
  if(e.target.closest('#editToggle')){editMode=!editMode;render();}
  else if(e.target.closest('#resetShapes')){shapes=JSON.parse(JSON.stringify(SHAPE_DEF));try{localStorage.removeItem('vsmShapes3');}catch(_){}render();}
});
document.querySelector('.stage').addEventListener('mousedown',e=>{
  const hh=e.target.closest('.handle');if(!hh)return;
  e.preventDefault();drag={shp:hh.dataset.shp,pt:+hh.dataset.pt};
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  const svg=document.querySelector('#stagewrap svg');if(!svg||!svg.getScreenCTM())return;
  const m=svg.getScreenCTM().inverse();
  const x=Math.round(e.clientX*m.a+e.clientY*m.c+m.e), y=Math.round(e.clientX*m.b+e.clientY*m.d+m.f);
  shapes[drag.shp][drag.pt]=[x,y];
  const pe=document.getElementById('shp-'+drag.shp);if(pe)pe.setAttribute('d',shapeD(shapes[drag.shp]));
  const el=document.getElementById('editlayer');if(el)el.innerHTML=editHandles();
  updateShapeOut();
});
window.addEventListener('mouseup',()=>{if(drag){drag=null;try{localStorage.setItem('vsmShapes3',JSON.stringify(shapes));}catch(_){}}});

/* ---------- pan/zoom interaction: wheel = zoom at cursor · drag = pan · buttons = zoom in/out/fit ---------- */
document.getElementById('zin').onclick=()=>zoomCentre(1.4);
document.getElementById('zout').onclick=()=>zoomCentre(1/1.4);
document.getElementById('zpct').onclick=fitView;
document.querySelector('.stage').addEventListener('wheel',e=>{
  const svg=curSvg();if(!svg||!svg.getScreenCTM())return;
  e.preventDefault();
  const m=svg.getScreenCTM().inverse();
  const ux=e.clientX*m.a+e.clientY*m.c+m.e, uy=e.clientX*m.b+e.clientY*m.d+m.f;
  zoomAround(Math.pow(1.0015,-e.deltaY), ux, uy);
},{passive:false});
let panState=null, suppressClick=false;
document.querySelector('.stage').addEventListener('mousedown',e=>{
  suppressClick=false; // fresh interaction: never let a stale pan flag eat this click
  if(e.button!==0||e.target.closest('.handle')||e.target.closest('#zoomctl'))return; // handles -> shape editor; controls -> buttons
  const wh=stageWH(),vb=curVB();
  panState={sx:e.clientX,sy:e.clientY,px:panX,py:panY,sw:wh[0],sh:wh[1],vw:vb.w,vh:vb.h,moved:false};
});
window.addEventListener('mousemove',e=>{
  if(!panState)return;
  const dx=e.clientX-panState.sx, dy=e.clientY-panState.sy;
  if(!panState.moved && Math.hypot(dx,dy)<4)return;
  panState.moved=true; document.body.classList.add('panning');
  panX=panState.px - dx*(panState.vw/panState.sw);
  panY=panState.py - dy*(panState.vh/panState.sh);
  applyVB();
});
window.addEventListener('mouseup',()=>{ if(panState){ if(panState.moved) suppressClick=true; panState=null; document.body.classList.remove('panning'); } });
// re-fit the canvas whenever the frame/iframe is resized, so the diagram always uses the available space (never stuck zoomed/clipped)
let _fitT; window.addEventListener('resize',()=>{ clearTimeout(_fitT); _fitT=setTimeout(fitView,140); });

/* ======================================================================
   INTEGRATION BRIDGE — iframe + postMessage   (contract: VSM-VISUALIZATION-BRIEFING.md §12.9)
   ----------------------------------------------------------------------
   Lets the VSM7 host embed this file in an <iframe> and drive it. Runs 100%
   standalone when there is no parent frame (the bridge stays inert and the
   diagram behaves exactly as before). The visual design is NOT changed.

   HOST -> vsm.html   ( iframe.contentWindow.postMessage(msg,'*') )
     { cmd:'loadTree',    tree }       tree = { id, name, children:[ {id,name,children}, … ] }  (id = STABLE host id)
     { cmd:'setPath',     ids }        ids  = [ rootHostId, … , sifHostId ]  (stable host ids)
     { cmd:'setChannels', shown }      shown= { a,b,c,d,e,f,g,env,meta : bool }  (only known keys are applied)
     { cmd:'select',      type, idx }  type = a data-el value; idx required when type === 'unit'

   vsm.html -> HOST   ( posted to window.parent with '*'; also delivered to window.VSM.onEmit when inlined )
     { evt:'ready', api:1 }
     { evt:'elementClick', type, idx, hostId, name, sifId }
     { evt:'mutate', op, parentId, path, hostId?, name?, tempId?, index?, order?, from?, to? }   op = add|remove|rename|reorder
     { evt:'drill', path, sifId }
     { evt:'zoom',  path, sifId }
   `path` = array of host ids root..SIF;  `sifId`/`parentId` = current SIF host id.

   IDS: a host node keeps node.hostId (stable). The local node.id is a process-
   local counter and is NEVER used as cross-boundary identity. hostIdOf() falls
   back to 'local:<id>' for nodes the host never supplied (standalone/default tree).
   ====================================================================== */
const BRIDGE = (() => {
  const inFrame  = !!(window.parent && window.parent !== window);
  const TARGET   = '*';   // host may serve from any origin; we only ACT on well-formed {cmd}. Host should verify e.origin/e.source on its side.
  const hostIdOf = n => n ? (n.hostId != null ? n.hostId : 'local:' + n.id) : null;
  const pathIds  = () => path.map(hostIdOf);
  function postToHost(msg){
    try { if (inFrame) window.parent.postMessage(msg, TARGET); } catch(_){}
    try { if (window.VSM && typeof window.VSM.onEmit === 'function') window.VSM.onEmit(msg); } catch(_){}
  }

  /* ---------- HOST -> vsm.html ---------- */
  function fromHost(h){                              // host node -> local node, preserving hostId
    const kids = (h && h.children && h.children.length) ? h.children.map(fromHost) : null;
    const n = node(h && h.name != null ? String(h.name) : 'Unit', kids);
    if (h && h.id != null) n.hostId = h.id;
    if (kids) n._gen = false;
    return n;
  }
  function loadTree(h){
    if (!h || typeof h !== 'object') return;
    tree = fromHost(h); path = [tree]; selected = null; resetView(); render();
  }
  function findNodePath(id){                         // DFS -> [root..node] whose hostId === id, else null
    let res = null;
    (function dfs(n, acc){
      const a = acc.concat(n);
      if (String(hostIdOf(n)) === String(id)) { res = a; return; }
      (n.children || []).forEach(c => { if (!res) dfs(c, a); });
    })(tree, []);
    return res;
  }
  function setPath(ids){                             // ids = stable host ids, root..SIF
    if (!Array.isArray(ids) || !ids.length) return;
    let p = null;
    if (String(hostIdOf(tree)) === String(ids[0])) { // try the exact chain from root
      p = [tree]; let cur = tree;
      for (let k = 1; k < ids.length; k++){
        const nx = (cur.children || []).find(c => String(hostIdOf(c)) === String(ids[k]));
        if (!nx) { p = null; break; }
        p.push(nx); cur = nx;
      }
    }
    if (!p) p = findNodePath(ids[ids.length - 1]);    // fallback: locate the SIF id anywhere in the tree
    if (p) { path = p; selected = null; resetView(); render(); }
  }
  function setChannels(s){
    if (!s || typeof s !== 'object') return;
    for (const k in s) if (k in shown) shown[k] = !!s[k];
    render();
  }
  function select(type, idx){                        // host-driven selection (does NOT echo elementClick)
    if (type == null) selected = null;
    else if (type === 'unit') selected = { type:'unit', idx:+idx };
    else selected = { type };
    drawInfo(); render();
  }
  window.addEventListener('message', e => {
    const m = e.data;
    if (!m || typeof m !== 'object' || !m.cmd) return;   // ignore anything not in our contract
    if      (m.cmd === 'loadTree')    loadTree(m.tree);
    else if (m.cmd === 'setPath')     setPath(m.ids);
    else if (m.cmd === 'setChannels') setChannels(m.shown);
    else if (m.cmd === 'select')      select(m.type, m.idx);
    else if (m.cmd === 'setPaneVisibility') { if (m.pane == null || m.pane === 'details') setPane(!!m.visible); }
  });

  /* ---------- vsm.html -> HOST (called from the interaction handlers) ---------- */
  const api = {
    ready: () => postToHost({ evt:'ready', api:1 }),
    click: (type, idx, u) => postToHost({ evt:'elementClick', type, idx: idx == null ? null : idx,
                              hostId: u ? hostIdOf(u) : null, name: u ? u.name : null, sifId: hostIdOf(sif()) }),
    drill: () => postToHost({ evt:'drill', path: pathIds(), sifId: hostIdOf(sif()) }),
    zoom:  () => postToHost({ evt:'zoom',  path: pathIds(), sifId: hostIdOf(sif()) }),
    paneChanged: (visible) => postToHost({ evt:'paneVisibilityChanged', pane:'details', visible: !!visible }),
    mutate: (op, d = {}) => {
      const u = d.node, p = { evt:'mutate', op, parentId: hostIdOf(sif()), path: pathIds() };
      if (u) { p.hostId = hostIdOf(u); p.name = u.name; }
      if (d.tempId != null) p.tempId = d.tempId;
      if (d.index  != null) p.index  = d.index;
      if (d.order)          p.order  = d.order.map(hostIdOf);
      if (d.from   != null) p.from   = d.from;
      if (d.to     != null) p.to     = d.to;
      postToHost(p);
    },
  };

  /* Optional programmatic API (inline embedding / tests) — mirrors the postMessage cmds.
     iframe hosts use postMessage; inline hosts may call these directly and read events via onEmit. */
  window.VSM = { loadTree, setPath, setChannels, select, setPaneVisibility: v => setPane(!!v), onEmit: null,
                 getState: () => ({ path: pathIds(), sif: hostIdOf(sif()), shown: { ...shown }, selected, paneShown }) };
  return api;
})();

// initial detail-pane state from the URL — e.g. embed `vsm.html?pane=hidden` to open the
// standalone view collapsed (gives the diagram the full width without any bridge wiring).
{const _p=(new URLSearchParams(location.search).get('pane')||'').toLowerCase();
 if(_p==='hidden'||_p==='collapsed'||_p==='false'||_p==='0'){paneShown=false;document.body.classList.add('pane-hidden');}}
render();
renderPaneToggle();
BRIDGE.ready();
</script>
