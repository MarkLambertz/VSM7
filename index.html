<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VSM7 Workshop Workspace</title>
    <script>
      try {
        var savedSkin = localStorage.getItem("vsm7-interface-skin");
        document.documentElement.dataset.skin = savedSkin === "command-deck" ? savedSkin : "workshop";
      } catch (_) {
        document.documentElement.dataset.skin = "workshop";
      }
    </script>
    <link rel="stylesheet" href="./src/presentation/styles.css?v=20260621-channel-variety-eight">
  </head>
  <body>
    <div id="app" class="app-shell"></div>
    <script>
      function showVsm7BootError(message) {
        var app = document.getElementById("app");
        if (!app || app.innerHTML.trim()) return;
        app.innerHTML = '<main style="font-family: system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; max-width: 760px; margin: 80px auto; padding: 24px; border: 1px solid #d7ded9; border-radius: 12px; background: #fff; color: #1f2933;"><p style="margin: 0 0 8px; color: #2f7fb9; font-weight: 800; text-transform: uppercase;">VSM7 could not start</p><h1 style="margin: 0 0 12px; font-size: 32px;">Startup problem</h1><p style="margin: 0 0 16px; color: #66727f;">The page shell loaded, but the application script did not finish.</p><pre style="white-space: pre-wrap; padding: 12px; border-radius: 8px; background: #f4f7f5;">' + String(message || "Unknown error").replace(/[&<>"']/g, function (char) { return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" })[char]; }) + '</pre></main>';
      }
      window.addEventListener("error", function (event) {
        showVsm7BootError(event.message || (event.error && event.error.message) || "Script failed to load.");
      });
      window.addEventListener("unhandledrejection", function (event) {
        showVsm7BootError(event.reason && (event.reason.stack || event.reason.message) || event.reason);
      });
      window.setTimeout(function () {
        var app = document.getElementById("app");
        if (app && !app.innerHTML.trim()) {
          showVsm7BootError("No app content was rendered. Port 4173 may still be serving another local app or an old server process.");
        }
      }, 2500);
    </script>
    <script type="module" src="./src/presentation/app.js?v=20260621-channel-variety-eight"></script>
  </body>
</html>
